# NOTE: Deploys are handled by Cloudflare Pages' native Git integration
# (Cloudflare builds + deploys on every push, with automatic branch previews).
# This workflow no longer runs on push — it's retained as a working, adaptable
# reference (checkout → node → build → authenticated Cloudflare call via
# secrets) for future automation such as Substack cross-posting. To re-enable
# Action-based deploys instead, restore the `push: branches: [main]` trigger
# below and remove the Cloudflare Git integration.
name: Deploy to Cloudflare Pages

on:
  # Manual-only: does not fire automatically. Run from the Actions tab if needed.
  workflow_dispatch:

# Prevent overlapping deploys; let the newest win.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `blogger` must match the Pages project name you create in the
          # Cloudflare dashboard (Workers & Pages → Create → Pages → Direct upload).
          command: pages deploy dist --project-name=blogger --branch=main
